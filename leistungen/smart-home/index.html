<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Smart Home | Gardinen</title>
<link rel="stylesheet" href="../../assets/blob.css">
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
body{background:#160811;color:white}
.stage{position:fixed;inset:0;overflow:hidden;background:#160811}
.full-image{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 20% 25%,rgba(201,0,70,.32),transparent 18%),
    radial-gradient(circle at 70% 28%,rgba(255,255,255,.70),transparent 15%),
    radial-gradient(circle at 58% 75%,rgba(255,184,92,.42),transparent 22%),
    linear-gradient(135deg,#fff8ef,#ffd7e6,#fff1cf);
  display:grid;place-items:center;text-align:center;padding:28px;
  transform:scale(1.08);filter:blur(3px) brightness(.75);
  transition:transform 1.2s ease,filter 1.2s ease;
}
.stage.open .full-image{transform:scale(1);filter:blur(0) brightness(1)}
.full-image-inner{color:#261018;background:rgba(255,255,255,.58);border:1px solid rgba(255,255,255,.55);border-radius:34px;padding:clamp(24px,5vw,52px);box-shadow:0 24px 80px rgba(0,0,0,.16);backdrop-filter:blur(10px)}
.full-image-inner strong{display:block;font-size:clamp(2.6rem,11vw,7rem);line-height:.9;letter-spacing:-.07em;color:#c90046}
.full-image-inner span{display:block;margin-top:12px;color:#72515f;font-weight:800}
.curtain{
  position:absolute;top:0;bottom:0;width:52%;z-index:3;
  background:repeating-linear-gradient(90deg,#4b0019 0 18px,#790029 18px 34px,#c90046 34px 48px,#650020 48px 66px);
  box-shadow:inset 0 0 100px rgba(0,0,0,.58);
  transition:transform 1.55s cubic-bezier(.65,0,.15,1);
}
.curtain.left{left:0;border-right:3px solid rgba(255,255,255,.16)}
.curtain.right{right:0;border-left:3px solid rgba(255,255,255,.16)}
.stage.open .curtain.left{transform:translateX(-102%)}
.stage.open .curtain.right{transform:translateX(102%)}
.title{
  position:absolute;z-index:5;top:8vh;left:50%;transform:translateX(-50%);
  width:min(760px,calc(100% - 28px));text-align:center;text-shadow:0 4px 24px rgba(0,0,0,.72)
}
.title h1{margin:0;font-size:clamp(2.4rem,9vw,6rem);line-height:.9;letter-spacing:-.07em}
.title p{margin:12px 0 0;color:rgba(255,255,255,.86);font-size:clamp(1rem,3vw,1.25rem);line-height:1.5}
.stage.open .title{display:none}
.controls{
  position:absolute;z-index:6;left:50%;bottom:24px;transform:translateX(-50%);
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;width:min(760px,calc(100% - 28px))
}
button,a{font:inherit}
.btn{
  border:0;border-radius:999px;padding:14px 18px;font-weight:900;cursor:pointer;text-decoration:none;
  color:white;background:linear-gradient(135deg,#c90046,#ff4f87,#ff8a00);
  box-shadow:0 14px 40px rgba(201,0,70,.28)
}
.btn.secondary{color:#c90046;background:rgba(255,255,255,.86);border:1px solid rgba(201,0,70,.20);box-shadow:none}
@media(max-width:760px){
  .controls{bottom:18px}
  .btn{width:100%;text-align:center}
}
</style>
</head>
<body data-blob-mode="sales">
<section class="stage" id="stage">
  <div class="full-image">
    <div class="full-image-inner">
      <strong>Dein Bild</strong>
      <span>Hier kommt später das komplette Smart-Home-Gemälde rein.</span>
    </div>
  </div>
  <div class="curtain left"></div>
  <div class="curtain right"></div>
  <div class="title">
    <h1>Intelligente Gardinen</h1>
    <p>Erst nur Stoff. Dann Bühne. Dann Smart Home.</p>
  </div>
  <div class="controls">
    <button class="btn" id="openCurtain">Gardinen öffnen</button>
    <button class="btn secondary" id="closeCurtain">Schließen</button>
    <a class="btn secondary" href="../">Zurück zu Leistungen</a>
  </div>
</section>
<script>
window.BLOB_CONFIG={mode:"sales",links:{home:"../../",services:"../"}};
</script>
<script src="../../assets/blob.js" defer></script>
<script>
const stage=document.getElementById("stage");
document.getElementById("openCurtain").onclick=()=>stage.classList.add("open");
document.getElementById("closeCurtain").onclick=()=>stage.classList.remove("open");
</script>
</body>
</html>
